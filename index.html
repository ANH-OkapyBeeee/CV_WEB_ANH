<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANH Hub | Alexis Nicolas Hurtado</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Iconos Lucide (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <main class="app-container">
        
        <!-- SELECTOR DE PERFILES (EL HUB) -->
        <section id="career-hub" style="padding: 1.5rem; text-align: center;">
            <p style="text-align: center; color: var(--gl-text-muted); font-size: 0.8rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px;">Selecciona un Enfoque Profesional</p>
            <div class="hub-container">
                <button class="hub-btn active" onclick="switchProfile('ia')">Inteligencia Artificial</button>
                <button class="hub-btn" onclick="switchProfile('software')">Software Engineering</button>
                <button class="hub-btn" onclick="switchProfile('seguridad')">Ciberseguridad / Forense</button>
                <button class="hub-btn" onclick="switchProfile('negocios')">Finanzas / Inversión</button>
                <button class="hub-btn" onclick="switchProfile('real')">Experiencia Real / Negocios</button>
            </div>
        </section>

        <!-- Header / Hero Section (Dinamico) -->
        <section id="hero">
            <header>
                <div class="profile-container">
                    <div class="profile-img">
                        <!-- Placeholder dinámico -->
                        <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide-user" style="color:var(--gl-accent)">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>
                <div class="profile-info">
                    <h1>Alexis Nicolas Hurtado</h1>
                    <p>Especialista en Orquestación de IA</p>
                    <div class="contact-actions">
                        <a href="mailto:alexmetal0429@gmail.com" class="btn btn-primary">
                            <i data-lucide="mail"></i> Contactar
                        </a>
                        <a href="https://github.com/ANH-OkapyBeeee" target="_blank" class="btn btn-outline">
                            <i data-lucide="github"></i> Mi portafolio
                        </a>
                    </div>
                </div>
            </header>
        </section>

        <!-- About Me Section (Dinamico) -->
        <section id="about">
            <h2>Sobre mí</h2>
            <p>Cargando información...</p>
        </section>

        <!-- Skills Section (Dinamico) -->
        <section id="skills">
            <h2>Habilidades Técnicas</h2>
            <div class="skills-grid">
                <!-- Se llena por JS -->
            </div>
        </section>

        <!-- Experience/Projects Section (Dinamico) -->
        <section id="projects">
            <h2>Proyectos Destacados</h2>
            <div id="projects-container" style="display: grid; gap: 1rem; margin-top: 1rem;">
                <!-- Se llena por JS -->
            </div>
        </section>

    </main>

    <!-- Script de lógica de perfiles -->
    <script src="main.js"></script>
</body>
</html>
